services:
  px4-ros2-sitl-qgc:
    image: ghcr.io/lxk36/xgc2-app-store/px4-ros2-sitl-qgc:1.0.0
    container_name: ${CONTAINER_NAME}
    privileged: true
    network_mode: host
    restart: unless-stopped
    environment:
      DISPLAY: ${DISPLAY:-}
      XAUTHORITY: ${XAUTHORITY:-}
      XGC_USER: ${XGC_USER}
      USER_UID: ${USER_UID}
      USER_GID: ${USER_GID}
      PX4_LOG_DIR: ${PX4_LOG_DIR}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-all}
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${PX4_LOG_DIR}:/var/log/px4
    stdin_open: true
    tty: true
    command: ["bash"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/px4-ros2-sitl-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
