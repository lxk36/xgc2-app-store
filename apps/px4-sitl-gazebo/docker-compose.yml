services:
  px4-sitl-gazebo:
    image: ghcr.io/lxk36/xgc2-app-store/px4-sitl-gazebo:1.0.3
    container_name: ${CONTAINER_NAME}
    privileged: true
    network_mode: host
    restart: unless-stopped
    environment:
      DISPLAY: ${DISPLAY:-}
      XAUTHORITY: ${XAUTHORITY:-}
      PX4_AUTOPILOT_HOME: /root/PX4-Autopilot
      PX4_SITL_HOME: /root/PX4-Autopilot
      PX4_WORKSPACE: ${PX4_WORKSPACE}
      PX4_LOG_DIR: ${PX4_LOG_DIR}
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XGC_HOST_WORKSPACE_DIR}/${PX4_WORKSPACE}:/workspace
      - ${XGC_HOST_WORKSPACE_DIR}/${PX4_LOG_DIR}:/var/log/px4_sitl
    stdin_open: true
    tty: true
    command: ["bash", "-lc", "source /opt/ros/noetic/setup.bash && sleep infinity"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/px4-sitl-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
