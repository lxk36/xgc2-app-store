services:
  ros-jazzy-ros-base-noble:
    image: ghcr.io/lxk36/xgc2-app-store/ros-jazzy-ros-base-noble:1.0.0
    container_name: ${CONTAINER_NAME}
    network_mode: host
    restart: unless-stopped
    environment:
      ROS2_WORKSPACE: ${ROS2_WORKSPACE}
    volumes:
      - ${ROS2_WORKSPACE}:/workspace
    stdin_open: true
    tty: true
    command: ["bash", "-lc", "source /opt/ros/jazzy/setup.bash && sleep infinity"]
