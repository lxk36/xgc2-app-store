services:
  gazebo-harmonic-ros2:
    image: ghcr.io/lxk36/xgc2-app-store/gazebo-harmonic-ros2:1.0.0
    container_name: ${CONTAINER_NAME}
    network_mode: host
    restart: unless-stopped
    environment:
      DISPLAY: ${DISPLAY:-}
      XAUTHORITY: ${XAUTHORITY:-}
      XGC_USER: ${XGC_USER}
      USER_UID: ${USER_UID}
      USER_GID: ${USER_GID}
      SIM_WORKSPACE: ${SIM_WORKSPACE}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${SIM_WORKSPACE}:/workspace
    stdin_open: true
    tty: true
    command: ["bash"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/gazebo-harmonic-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
