name: XGC2 Development Workstation
title: ROS 2 Jazzy and Qt development workstation
additionalProperties:
  key: xgc2-dev-workstation
  name: XGC2 Development Workstation
  tags:
    - ROS2
    - Qt
    - Docker
    - Desktop
  shortDescEn: ROS 2 Jazzy workstation with Qt development packages and Docker CLI.
  description:
    en: Public CI-built development image for source-level XGC2 work. It replaces the old local Qt-source bind-mount image with a reproducible package-based workstation.
  type: development
  crossVersionUpdate: true
  limit: 0
  website: https://docs.ros.org/en/jazzy/
  github: https://github.com/lxk36/xgc2-app-store
  document: https://github.com/lxk36/xgc2-app-store/tree/master/apps/xgc2-dev-workstation
  architectures:
    - amd64
  batchInstallSupport: true
  formFields:
    - default: xgc2-dev-workstation
      envKey: CONTAINER_NAME
      label:
        en: Container name
      required: true
      type: text
    - default: xgc
      envKey: XGC_USER
      label:
        en: User name
      required: true
      type: text
    - default: "1000"
      envKey: USER_UID
      label:
        en: User UID
      required: true
      type: number
    - default: "1000"
      envKey: USER_GID
      label:
        en: User GID
      required: true
      type: number
    - default: /tmp/xgc2_source
      envKey: SOURCE_WORKSPACE
      label:
        en: Source workspace
      required: true
      type: text
    - default: /var/run/docker.sock
      envKey: DOCKER_SOCKET
      label:
        en: Docker socket
      required: true
      type: text
