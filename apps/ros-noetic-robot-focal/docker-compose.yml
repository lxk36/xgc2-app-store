services:
  ros-noetic-robot-focal:
    image: ghcr.io/lxk36/xgc2-app-store/ros-noetic-robot-focal:1.0.0
    container_name: ${CONTAINER_NAME}
    network_mode: host
    restart: unless-stopped
    environment:
      DISABLE_ROS1_EOL_WARNINGS: "1"
      DISPLAY: ${DISPLAY:-}
      XAUTHORITY: ${XAUTHORITY:-}
      ROS_WORKSPACE: ${ROS_WORKSPACE}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XGC_HOST_WORKSPACE_DIR}/${ROS_WORKSPACE}:/home/ros_ws
    stdin_open: true
    tty: true
    command: ["bash", "-lc", "export DISABLE_ROS1_EOL_WARNINGS=1; source /opt/ros/noetic/setup.bash && sleep infinity"]
